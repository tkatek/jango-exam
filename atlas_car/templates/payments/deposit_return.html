{% extends 'base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-success">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="fas fa-undo me-2"></i>Return Deposit</h4>
                </div>
                <div class="card-body">
                    <p><strong>Reservation:</strong> {{ deposit.reservation }}</p>
                    <p><strong>Amount Received:</strong> {{ deposit.amount_received }} MAD</p>
                    <p><strong>Remaining to Return:</strong> <span class="text-danger fw-bold">{{ deposit.remaining_amount }} MAD</span></p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="amount_returned" class="form-label fw-bold">Amount to Return</label>
                            <input type="number" step="0.01" name="amount_returned" id="amount_returned" class="form-control" value="{{ deposit.remaining_amount }}">
                        </div>
                        <div class="mb-3">
                            <label for="notes" class="form-label fw-bold">Notes</label>
                            <textarea name="notes" id="notes" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-check me-1"></i>Confirm Return
                            </button>
                            <a href="{% url 'payments:deposit_list' %}" class="btn btn-secondary">
                                <i class="fas fa-times me-1"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
