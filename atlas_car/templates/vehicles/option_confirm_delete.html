{% extends 'base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-danger">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="fas fa-exclamation-triangle me-2"></i>Delete Option</h4>
                </div>
                <div class="card-body text-center">
                    <p class="fs-5">Are you sure you want to delete option <strong>{{ object.name }}</strong>?</p>
                    <p class="text-muted">Daily Price: {{ object.daily_price }} MAD</p>
                    <p class="text-danger"><i class="fas fa-info-circle me-1"></i>This action cannot be undone.</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger me-2">
                            <i class="fas fa-trash me-1"></i>Yes, Delete
                        </button>
                        <a href="{% url 'vehicles:option_list' %}" class="btn btn-secondary">
                            <i class="fas fa-times me-1"></i>Cancel
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
