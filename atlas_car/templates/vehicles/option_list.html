{% extends 'base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-cogs me-2"></i>Vehicle Options</h2>
        <a href="{% url 'vehicles:option_create' %}" class="btn btn-primary">
            <i class="fas fa-plus me-1"></i>Add Option
        </a>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Daily Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for option in options %}
                        <tr>
                            <td>{{ option.pk }}</td>
                            <td>{{ option.name }}</td>
                            <td>{{ option.daily_price }} MAD</td>
                            <td>
                                <a href="{% url 'vehicles:option_edit' option.pk %}" class="btn btn-sm btn-warning me-1">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a href="{% url 'vehicles:option_delete' option.pk %}" class="btn btn-sm btn-danger">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="4" class="text-center text-muted">No options found.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
