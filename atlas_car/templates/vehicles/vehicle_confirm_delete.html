{% extends 'base.html' %}
{% block title %}Delete Vehicle - Atlas Car Location{% endblock %}
{% block page_title %}Delete Vehicle{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h6 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Confirm Deletion</h6>
            </div>
            <div class="card-body text-center">
                <p>Are you sure you want to delete <strong>{{ vehicle }}</strong>?</p>
                <p class="text-muted">This action cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> Yes, Delete</button>
                    <a href="{% url 'vehicles:vehicle_detail' vehicle.pk %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
