<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Atlas Car Location</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .login-card { background: #fff; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); padding: 40px; width: 100%; max-width: 400px; }
        .login-card h2 { text-align: center; color: #1a1a2e; margin-bottom: 10px; }
        .login-card .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        .login-card .brand-icon { text-align: center; margin-bottom: 20px; }
        .login-card .brand-icon i { font-size: 50px; color: #0d6efd; }
        .btn-primary { background: linear-gradient(135deg, #0d6efd, #0b5ed7); border: none; padding: 12px; font-weight: 600; }
        .btn-primary:hover { background: linear-gradient(135deg, #0b5ed7, #0a58ca); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-icon">
            <i class="fas fa-car"></i>
        </div>
        <h2>Atlas Car Location</h2>
        <p class="subtitle">Car Rental Management System</p>

        {% if form.errors %}
        <div class="alert alert-danger">
            Invalid username or password.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
    </div>
</body>
</html>
