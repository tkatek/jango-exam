{% extends 'base.html' %}
{% load static %}

{% block title %}Login - Atlas Car Location{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:70vh">
    <div class="card login-card" style="max-width:440px;width:100%;padding:28px;border-radius:14px">
        <div class="text-center mb-3">
            <img src="{% static 'img/logo.svg' %}" alt="Atlas Car" style="width:84px;height:84px;">
        </div>
        <h4 class="text-center mb-1" style="color:var(--accent)">Welcome back</h4>
        <p class="text-center text-muted mb-3">Sign in to continue to Atlas Car</p>

        {% if form.errors %}
        <div class="alert alert-danger">
            Invalid username or password.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
